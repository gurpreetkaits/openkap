# Memory -- 48MB is plenty for dev cache/sessions
maxmemory 48mb
maxmemory-policy allkeys-lru

# No persistence (cache/session data is ephemeral)
save ""
appendonly no

# Fewer databases
databases 2

# Disable unused commands
rename-command FLUSHALL ""
rename-command FLUSHDB ""

# TCP keepalive
tcp-keepalive 60

# Close idle connections after 5 min
timeout 300
