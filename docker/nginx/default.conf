server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    # === Buffer sizes ===
    client_body_buffer_size 16k;
    client_header_buffer_size 2k;
    large_client_header_buffers 4 2k;

    # Video uploads need large body size
    client_max_body_size 10G;

    # Timeouts for video upload/processing
    client_body_timeout 1800s;
    send_timeout 1800s;

    # Gzip — saves bandwidth, reduces transfer time
    gzip on;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/vnd.apple.mpegurl;
    gzip_vary on;

    # Vue SPA — served under /app/
    location ^~ /app/ {
        alias /var/www/html/frontend/dist/;
        index index.html;
        try_files $uri $uri/ /app/index.html;
        add_header Cache-Control "no-cache";
    }

    # Vue SPA static assets (hashed filenames — long cache)
    location ^~ /app/assets/ {
        alias /var/www/html/frontend/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Tight FastCGI buffers
        fastcgi_buffers 8 16k;
        fastcgi_buffer_size 32k;

        fastcgi_read_timeout 1800s;
        fastcgi_send_timeout 1800s;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
    }

    # Static assets — long cache, skip access log
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # HLS playlists
    location ~* \.m3u8$ {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Cache-Control "no-cache";
        try_files $uri /index.php?$query_string;
    }

    # HLS segments
    location ~* \.ts$ {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # ClipForge API
    location ^~ /api/clipforge/ {
        try_files $uri /index.php?$query_string;
    }

    # Video streaming
    location ~* \.(mp4|webm|mov)$ {
        add_header Accept-Ranges bytes;
        access_log off;
        try_files $uri /index.php?$query_string;
    }
}
