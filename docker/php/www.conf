[www]
; Run as appuser
user = appuser
group = appgroup

; Listen on port 9000 (for nginx FastCGI)
listen = 0.0.0.0:9000

; Dynamic process manager -- starts fewer processes, scales up on demand
; Better for dev: lower idle memory, spins up workers only when needed
pm = dynamic
pm.max_children = 3
pm.start_servers = 1
pm.min_spare_servers = 1
pm.max_spare_servers = 2
pm.max_requests = 500

; Slow log for debugging bottlenecks
slowlog = /var/log/php/slow.log
request_slowlog_timeout = 5s

; Terminate stuck requests (safety net -- nginx also has timeouts)
request_terminate_timeout = 1800s

; Clear environment for security
clear_env = no
