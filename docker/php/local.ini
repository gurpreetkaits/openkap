; Maximum upload file size (10GB for video uploads)
upload_max_filesize = 10G
post_max_size = 10G

; Memory limit for video processing
memory_limit = 512M

; Execution time for video processing (30 minutes)
max_execution_time = 1800
max_input_time = 1800

; Error reporting (development mode)
display_errors = On
display_startup_errors = On
log_errors = On
error_log = /var/log/php/error.log
error_reporting = E_ALL

; Session configuration
session.save_handler = redis
session.save_path = "tcp://redis:6379"

; OPcache for performance (development mode)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1     ; Enable timestamp validation for development
opcache.revalidate_freq = 0         ; Check on every request (0 = always check)
