services:
  # PHP-FPM Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    image: openkap-app
    container_name: openkap-app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      FFMPEG_BINARIES: /usr/bin/ffmpeg
      FFPROBE_BINARIES: /usr/bin/ffprobe
    volumes:
      - .:/var/www/html:cached
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/zz-www.conf
    tmpfs:
      - /tmp:size=64m
    networks:
      - openkap
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    mem_limit: 384m
    cpus: 0.75

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: openkap-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8888}:80"
    volumes:
      - .:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    tmpfs:
      - /var/cache/nginx:size=16m
      - /tmp:size=16m
    networks:
      - openkap
    depends_on:
      app:
        condition: service_healthy
    mem_limit: 48m
    cpus: 0.25

  # MariaDB
  db:
    image: mariadb:10.11
    container_name: openkap-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-openkap}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-openkap}
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mariadb/my.cnf:/etc/mysql/conf.d/custom.cnf
    ports:
      - "${DOCKER_DB_PORT:-13306}:3306"
    networks:
      - openkap
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 192m
    cpus: 0.5

  # Redis
  redis:
    image: redis:alpine
    container_name: openkap-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "${DOCKER_REDIS_PORT:-16379}:6379"
    networks:
      - openkap
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 3s
    mem_limit: 64m
    cpus: 0.15

  # Queue Worker (reuses app image -- zero extra build time)
  queue:
    image: openkap-app
    container_name: openkap-queue
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      FFMPEG_BINARIES: /usr/bin/ffmpeg
      FFPROBE_BINARIES: /usr/bin/ffprobe
    command: php artisan queue:work --queue=default --tries=3 --timeout=1800 --memory=256 --sleep=3
    volumes:
      - .:/var/www/html:cached
    tmpfs:
      - /tmp:size=128m
    networks:
      - openkap
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 320m
    cpus: 0.75

  # Frontend dev server
  frontend:
    image: node:18-alpine
    container_name: openkap-frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${FRONTEND_PORT:-3333}:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:${APP_PORT:-8888}
      - VITE_PROXY_TARGET=http://nginx
    volumes:
      - ./frontend:/app:cached
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - openkap
    depends_on:
      - nginx
    mem_limit: 384m
    cpus: 0.75

networks:
  openkap:
    driver: bridge

volumes:
  dbdata:
  frontend_node_modules:
